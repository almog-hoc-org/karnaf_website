<!doctype html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>הרשמה לוובינר</title>
  <style>html,body{margin:0;padding:0;background:transparent;overflow:hidden}</style>
</head>
<body>
  <!-- Ravpage form builds itself via document.write(); this real same-origin
       page gives it a valid Referer (domain-locked) and a parsing document. -->
  <script type="text/javascript" src="//form2.ravpage.co.il/9c142ed5153e8b375257a55c8f388aaa6A44EF14" charset="UTF-8"></script>
  <script>
    function reportHeight() {
      parent.postMessage({ ravpageHeight: document.body.scrollHeight }, "*");
    }
    new ResizeObserver(reportHeight).observe(document.body);
    window.addEventListener("load", reportHeight);
  </script>
</body>
</html>
