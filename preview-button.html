<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview — כפתור Hero</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0d1b2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #ffffff;
      color: #c2601a;
      font-weight: 700;
      font-size: 18px;
      padding: 20px 40px;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }

    .btn:hover {
      background: rgba(255,255,255,0.9);
    }

    .arrow {
      display: inline-block;
      transition: transform 0.2s;
    }

    .btn:hover .arrow {
      transform: translateX(-4px);
    }
  </style>
</head>
<body>
  <a class="btn" href="#">
    פרטים על התוכנית שלנו
    <span class="arrow" aria-hidden="true">←</span>
  </a>
</body>
</html>
